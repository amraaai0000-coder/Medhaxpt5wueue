<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Orpus Voice</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#191919;overflow:hidden;font-family:Georgia,serif;color:#fff}
  #app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

  /* Header */
  #header{display:flex;justify-content:center;gap:40px;padding:14px 20px;border-bottom:1px solid rgba(32,178,170,.18);flex-shrink:0}
  .tab-btn{cursor:pointer;text-align:center}
  .tab-label{font-size:17px;font-weight:600;letter-spacing:.5px;transition:color .2s}
  .tab-line{height:2px;background:#20B2AA;border-radius:1px;margin-top:4px;transition:width .2s;width:0}
  .tab-btn.active .tab-label{color:#fff}
  .tab-btn:not(.active) .tab-label{color:rgba(255,255,255,.38)}
  .tab-btn.active .tab-line{width:40px}

  /* Body */
  #body{flex:1;position:relative;overflow:hidden}
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s,transform .3s cubic-bezier(.25,.46,.45,.94)}

  /* Voice panel */
  #voice-panel .orb-wrap{cursor:pointer;transition:transform .1s ease-out}
  #tap-start{cursor:pointer;color:rgba(255,255,255,.38);font-size:15px;font-weight:600;letter-spacing:.5px;margin-top:28px;display:none}

  /* Chat panel */
  #chat-panel{align-items:flex-start;justify-content:flex-start;padding:32px 24px;overflow-y:auto;transform:translateX(100%);opacity:0;pointer-events:none}
  #chat-panel.active{transform:translateX(0);opacity:1;pointer-events:all}
  #chat-empty{color:rgba(255,255,255,.2);font-size:18px;font-weight:600;text-align:center;width:100%;margin-top:80px}
  #word-container{line-height:1.8;display:flex;flex-wrap:wrap;gap:5px 6px}
  .word{font-size:18px;font-weight:600;color:rgba(255,255,255,.08);transition:color .15s ease;display:inline-block}
  .word.lit{color:#fff}

  /* Bottom controls */
  #bottom{display:flex;align-items:center;justify-content:space-between;padding:28px 40px;border-top:1px solid rgba(32,178,170,.12);flex-shrink:0;background:#191919}
  .ctrl-btn{width:60px;height:60px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
  #btn-end{background:rgba(135,206,235,.12);border:1.5px solid rgba(135,206,235,.45)}
  #btn-mic{background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.24)}
  #btn-mic.muted{background:rgba(255,0,0,.15);border-color:rgba(255,0,0,.5)}
  #state-label{font-size:16px;font-weight:600;letter-spacing:.5px;color:rgba(255,255,255,.7);min-width:110px;text-align:center;transition:opacity .25s}

  /* Toast */
  #toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:#2a2a2a;color:rgba(255,255,255,.8);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;max-width:80%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  #toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="header">
    <div class="tab-btn active" id="tab-voice" onclick="switchTab(0)">
      <div class="tab-label">Voice</div>
      <div class="tab-line"></div>
    </div>
    <div class="tab-btn" id="tab-chat" onclick="switchTab(1)">
      <div class="tab-label">Chat</div>
      <div class="tab-line"></div>
    </div>
  </div>

  <!-- Body -->
  <div id="body">

    <!-- Voice panel -->
    <div class="panel" id="voice-panel">
      <div style="flex:2"></div>
      <div class="orb-wrap" id="orb-wrap" onclick="onTap()">
        <canvas id="orb" width="240" height="240" style="border-radius:50%;display:block"></canvas>
      </div>
      <div id="tap-start" onclick="onTap()">Tap to start</div>
      <div style="flex:3"></div>
    </div>

    <!-- Chat panel -->
    <div class="panel" id="chat-panel">
      <div id="chat-empty">Voice answer will appear here...</div>
      <div id="word-container"></div>
    </div>

  </div>

  <!-- Bottom controls -->
  <div id="bottom">
    <div class="ctrl-btn" id="btn-end" onclick="onEndCall()" title="End call">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="#87CEEB">
        <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/>
      </svg>
    </div>

    <div id="state-label"></div>

    <div class="ctrl-btn" id="btn-mic" onclick="toggleMute()" title="Mute">
      <svg id="mic-icon" width="26" height="26" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28C16.28 17.23 19 14.41 19 11h-1.7z"/>
      </svg>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────────
const BACKEND    = 'https://orpus-voice.onrender.com';
const CHAT_URL   = BACKEND + '/chat';
const STREAM_URL = BACKEND + '/voice-turn-stream';
const MAX_MS     = 30000;
const SILENCE_MS = 2000;
const AMP_THRESH = 0.025;
const CONV_MAX   = 20;
const VS = { IDLE:'idle', CONNECTING:'connecting', LISTENING:'listening', THINKING:'thinking', SPEAKING:'speaking' };

// ── State ──────────────────────────────────────────────────────────────────────
let voiceState   = VS.IDLE;
let isMuted      = false;
let backendAwake = false;
let sessionOn    = false;
let orbPulse     = 0;
let allWords     = [];
let hlCount      = 0;
let convHistory  = [];
let lastQuery    = '';

// Audio refs
let audioCtx     = null;
let micStream    = null;
let processor    = null;
let pcmChunks    = [];
let spokenOnce   = false;
let lastSoundAt  = null;
let sentFlag     = false;

// Timers
let maxTimer     = null;
let silTimer     = null;
let decayTimer   = null;
let abortCtrl    = null;

// Playback
let chunkQueue   = [];
let isPlaying    = false;
let streamDone   = false;
let playCtx      = null;

// ── ORB CANVAS ANIMATION ────────────────────────────────────────────────────────
const canvas = document.getElementById('orb');
const ctx2d  = canvas.getContext('2d');
const SIZE   = 240;
let orbTime  = 0;
let orbIntens = 0;
let orbActive = false;

const COLORS = ['#0044FF','#8800FF','#FF0055','#CCBBFF'];

function drawOrb() {
  orbIntens += (orbPulse - orbIntens) * 0.12;
  orbTime   += orbActive ? 0.022 : 0.006;

  const r = SIZE / 2, cx = r, cy = r;
  ctx2d.clearRect(0, 0, SIZE, SIZE);

  ctx2d.save();
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2d.clip();

  for (let i = 0; i < 8; i++) {
    const spd   = orbActive ? 3 : 1;
    const angle = orbTime * 2 * Math.PI * spd * (i % 2 ? -1 : 1) + i * 0.8;
    const dist  = r * (0.3 + 0.5 * orbIntens);
    const x     = cx + Math.cos(angle) * dist;
    const y     = cy + Math.sin(angle) * dist;
    const col   = COLORS[(i + Math.floor(orbTime * 1.5)) % COLORS.length];
    const br    = r * (0.5 + 0.3 * Math.sin(orbTime * 3 + i));
    const g     = ctx2d.createRadialGradient(x, y, 0, x, y, br);
    g.addColorStop(0, col + 'BB');
    g.addColorStop(1, col + '00');
    ctx2d.beginPath();
    ctx2d.arc(x, y, br, 0, Math.PI * 2);
    ctx2d.fillStyle = g;
    ctx2d.fill();
  }

  // Center white glow
  const wg = ctx2d.createRadialGradient(cx, cy, 0, cx, cy, r * 0.9);
  wg.addColorStop(0, `rgba(255,255,255,${(0.22 + 0.38 * orbIntens).toFixed(2)})`);
  wg.addColorStop(1, 'rgba(255,255,255,0)');
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r * 0.9, 0, Math.PI * 2);
  ctx2d.fillStyle = wg;
  ctx2d.fill();
  ctx2d.restore();

  // Glass highlight
  const gg = ctx2d.createRadialGradient(cx * .68, cy * .68, 0, cx, cy, r);
  gg.addColorStop(0,   'rgba(255,255,255,0.35)');
  gg.addColorStop(0.4, 'rgba(255,255,255,0.05)');
  gg.addColorStop(1,   'rgba(255,255,255,0)');
  ctx2d.beginPath();
  ctx2d.arc(cx, cy, r, 0, Math.PI * 2);
  ctx2d.fillStyle = gg;
  ctx2d.fill();

  // Outer glow via shadow
  const wrap = document.getElementById('orb-wrap');
  const gSize  = 50 + orbPulse * 30;
  const gColor = orbActive
    ? `rgba(136,0,255,${(0.45 + orbPulse * 0.3).toFixed(2)})`
    : `rgba(0,85,255,${(0.3 + orbPulse * 0.35).toFixed(2)})`;
  wrap.style.filter  = `drop-shadow(0 0 ${gSize}px ${gColor})`;
  wrap.style.transform = `scale(${1 + orbPulse * 0.05})`;

  requestAnimationFrame(drawOrb);
}
requestAnimationFrame(drawOrb);

// ── UI HELPERS ──────────────────────────────────────────────────────────────────
function setVS(s) {
  voiceState = s;
  orbActive  = (s === VS.THINKING || s === VS.SPEAKING);

  const labels = {
    [VS.IDLE]:       '',
    [VS.CONNECTING]: 'Connecting',
    [VS.LISTENING]:  isMuted ? 'Muted' : 'Listening',
    [VS.THINKING]:   'Thinking...',
    [VS.SPEAKING]:   'Speaking',
  };
  document.getElementById('state-label').textContent = labels[s] || '';

  const tapEl = document.getElementById('tap-start');
  tapEl.style.display = (s === VS.IDLE && !sessionOn) ? 'block' : 'none';
}

function switchTab(idx) {
  document.getElementById('tab-voice').classList.toggle('active', idx === 0);
  document.getElementById('tab-chat').classList.toggle('active',  idx === 1);
  document.getElementById('chat-panel').classList.toggle('active', idx === 1);
  // voice panel always visible behind
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}

function renderWords() {
  const empty = document.getElementById('chat-empty');
  const cont  = document.getElementById('word-container');
  if (allWords.length === 0) { empty.style.display = 'block'; cont.innerHTML = ''; return; }
  empty.style.display = 'none';
  cont.innerHTML = allWords.map((w, i) =>
    `<span class="word${i < hlCount ? ' lit' : ''}" data-i="${i}">${w}</span>`
  ).join('');
}

function revealWord(idx) {
  const el = document.querySelector(`.word[data-i="${idx}"]`);
  if (el) el.classList.add('lit');
}

// ── AUDIO HELPERS ───────────────────────────────────────────────────────────────
function f32toPCM16(f32) {
  const buf = new ArrayBuffer(f32.length * 2);
  const v   = new DataView(buf);
  for (let i = 0; i < f32.length; i++) {
    const s = Math.max(-1, Math.min(1, f32[i]));
    v.setInt16(i * 2, s < 0 ? s * 32768 : s * 32767, true);
  }
  return buf;
}

function encodeWAV(chunks, sr) {
  const total = chunks.reduce((s, c) => s + c.byteLength, 0);
  const buf   = new ArrayBuffer(44 + total);
  const v     = new DataView(buf);
  const ws    = (o, s) => { for (let i=0;i<s.length;i++) v.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,'RIFF'); v.setUint32(4, 36+total, true);
  ws(8,'WAVE'); ws(12,'fmt ');
  v.setUint32(16,16,true); v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,sr,true); v.setUint32(28,sr*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  ws(36,'data'); v.setUint32(40,total,true);
  let off = 44;
  for (const c of chunks) { new Uint8Array(buf).set(new Uint8Array(c), off); off += c.byteLength; }
  return buf;
}

function toB64(buf) {
  const u8 = new Uint8Array(buf);
  let s = '';
  for (let i=0;i<u8.length;i++) s += String.fromCharCode(u8[i]);
  return btoa(s);
}

function fromB64(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return arr.buffer;
}

// ── STOP RECORDING ─────────────────────────────────────────────────────────────
async function stopRecording() {
  clearTimeout(maxTimer);
  clearInterval(silTimer);
  clearInterval(decayTimer);
  if (processor)  { try{processor.disconnect();}catch(_){} processor = null; }
  if (micStream)  { micStream.getTracks().forEach(t=>t.stop()); micStream = null; }
  if (audioCtx && audioCtx.state !== 'closed') { try{await audioCtx.close();}catch(_){} audioCtx = null; }
  pcmChunks = [];
}

// ── PING BACKEND ──────────────────────────────────────────────────────────────
async function pingAndListen() {
  setVS(VS.CONNECTING);
  try {
    const res = await fetch(CHAT_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text:'hi', conversation_history:[], max_tokens:5}),
      signal: AbortSignal.timeout(35000),
    });
    if (res.ok) { backendAwake = true; startListening(); }
    else        { setVS(VS.IDLE); showToast('Could not connect. Tap to retry.'); }
  } catch {
    setVS(VS.IDLE);
    showToast('Connection failed. Check network and retry.');
  }
}

// ── START LISTENING ────────────────────────────────────────────────────────────
async function startListening() {
  await stopRecording();
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});

    // Create AudioContext at 16 kHz for backend compatibility
    audioCtx = new AudioContext({sampleRate:16000});

    // Create playback context on user-gesture thread
    if (!playCtx || playCtx.state === 'closed') playCtx = new AudioContext();
    else if (playCtx.state === 'suspended') playCtx.resume();

    const src      = audioCtx.createMediaStreamSource(micStream);
    processor      = audioCtx.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (isMuted) return;
      const f32 = e.inputBuffer.getChannelData(0);
      pcmChunks.push(f32toPCM16(f32));

      // Amplitude → orb pulse
      let maxA = 0;
      for (let i=0;i<f32.length;i++) maxA = Math.max(maxA, Math.abs(f32[i]));
      if (maxA > AMP_THRESH) {
        lastSoundAt = Date.now();
        spokenOnce  = true;
        orbPulse    = Math.min(1, orbPulse + 0.45);
      }
    };

    src.connect(processor);
    processor.connect(audioCtx.destination);

    pcmChunks  = [];
    spokenOnce = false;
    lastSoundAt = null;
    sentFlag    = false;
    orbPulse    = 0;
    setVS(VS.LISTENING);

    // Orb decay
    decayTimer = setInterval(() => {
      if (orbPulse > 0) orbPulse = Math.max(0, orbPulse - 0.04);
    }, 50);

    // 30-second hard limit
    maxTimer = setTimeout(() => {
      if (voiceState === VS.LISTENING) {
        showToast('30-second limit reached — processing audio...');
        flushAndSend();
      }
    }, MAX_MS);

    // Silence gate (2 seconds after last sound)
    silTimer = setInterval(() => {
      if (sentFlag || voiceState !== VS.LISTENING) return;
      if (!spokenOnce || !lastSoundAt) return;
      if (Date.now() - lastSoundAt >= SILENCE_MS) {
        sentFlag = true;
        flushAndSend();
      }
    }, 200);

  } catch(err) {
    setVS(VS.IDLE);
    if (err.name === 'NotAllowedError') showToast('Microphone permission denied.');
    else showToast('Could not access microphone.');
  }
}

// ── FLUSH + SEND ───────────────────────────────────────────────────────────────
async function flushAndSend() {
  const chunks = [...pcmChunks];
  pcmChunks = [];
  await stopRecording();
  if (chunks.length < 2) { restartListening(); return; }
  const wav = encodeWAV(chunks, 16000);
  if (wav.byteLength < 200) { restartListening(); return; }
  sendToBackend(wav);
}

function restartListening() {
  setTimeout(startListening, 400);
}

// ── SSE PIPELINE ───────────────────────────────────────────────────────────────
async function sendToBackend(wavBuf) {
  setVS(VS.THINKING);
  chunkQueue  = [];
  streamDone  = false;
  isPlaying   = false;

  const hist = convHistory.length > CONV_MAX
    ? convHistory.slice(-CONV_MAX)
    : [...convHistory];

  abortCtrl = new AbortController();

  try {
    const res = await fetch(STREAM_URL, {
      method:  'POST',
      headers: {'Content-Type':'application/json','Accept':'text/event-stream'},
      body:    JSON.stringify({audio_base64: toB64(wavBuf), sample_rate:16000, conversation_history:hist}),
      signal:  abortCtrl.signal,
    });

    if (!res.ok) { restartListening(); return; }

    const reader  = res.body.getReader();
    const dec     = new TextDecoder();
    let   buf     = '';
    let   curEvt  = null;

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line.startsWith('event:'))      { curEvt = line.slice(6).trim(); }
        else if (line.startsWith('data:') && curEvt) {
          try { handleEvt(curEvt, JSON.parse(line.slice(5).trim())); } catch(_){}
          curEvt = null;
        }
      }
    }
  } catch(err) {
    if (err.name !== 'AbortError') restartListening();
  }
}

function handleEvt(evt, data) {
  switch(evt) {
    case 'transcript':
      lastQuery = (data.transcript || '').trim();
      break;

    case 'reply_text': {
      const reply = (data.reply || '').trim();
      if (!reply) break;
      convHistory.push({role:'user',      content:lastQuery});
      convHistory.push({role:'assistant', content:reply});
      allWords = reply.trim().split(/\s+/);
      hlCount  = 0;
      renderWords();
      setVS(VS.SPEAKING);
      break;
    }

    case 'chunk': {
      const b64      = data.audio_base64;
      const words    = data.words || [];
      const startIdx = data.word_start_index || 0;
      if (b64) {
        chunkQueue.push({bytes: fromB64(b64), words, startIdx});
        if (!isPlaying) processQueue();
      }
      break;
    }

    case 'done':
      streamDone = true;
      if (!isPlaying) onAllDone();
      break;

    case 'error':
      restartListening();
      break;
  }
}

// ── AUDIO QUEUE ────────────────────────────────────────────────────────────────
async function processQueue() {
  isPlaying = true;
  while (chunkQueue.length > 0) {
    await playChunk(chunkQueue.shift());
  }
  isPlaying = false;
  if (streamDone) onAllDone();
}

async function playChunk({bytes, words, startIdx}) {
  try {
    if (!playCtx || playCtx.state === 'closed') playCtx = new AudioContext();
    const audioBuf = await playCtx.decodeAudioData(bytes.slice(0));
    const src      = playCtx.createBufferSource();
    src.buffer     = audioBuf;
    src.connect(playCtx.destination);

    // Word-by-word reveal (≈130 wpm → 462ms/word)
    let wi = 0;
    const wt = setInterval(() => {
      if (wi >= words.length) { clearInterval(wt); return; }
      hlCount = startIdx + wi + 1;
      revealWord(startIdx + wi);
      wi++;
    }, 462);

    src.start();
    await new Promise(r => { src.onended = r; });
    clearInterval(wt);
    // Ensure all words in this chunk revealed
    for (let i = wi; i < words.length; i++) revealWord(startIdx + i);
    hlCount = startIdx + words.length;
  } catch(_) {}
}

function onAllDone() {
  // Reveal any remaining words
  allWords.forEach((_, i) => revealWord(i));
  hlCount = allWords.length;
  setVS(VS.IDLE);
  if (sessionOn) setTimeout(startListening, 400);
}

// ── CONTROLS ───────────────────────────────────────────────────────────────────
function onTap() {
  if (voiceState === VS.IDLE) {
    sessionOn = true;
    setVS(VS.IDLE); // re-render to hide tap-start
    if (backendAwake) startListening();
    else pingAndListen();
  } else if (voiceState === VS.SPEAKING) {
    if (abortCtrl) abortCtrl.abort();
    chunkQueue  = [];
    streamDone  = false;
    setTimeout(startListening, 200);
  }
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('btn-mic').classList.toggle('muted', isMuted);
  document.getElementById('mic-icon').setAttribute('fill',
    isMuted ? '#FF6B6B' : 'rgba(255,255,255,0.7)');
  document.getElementById('mic-icon').innerHTML = isMuted
    ? '<path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/>'
    : '<path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28C16.28 17.23 19 14.41 19 11h-1.7z"/>';
  if (voiceState === VS.LISTENING) {
    document.getElementById('state-label').textContent = isMuted ? 'Muted' : 'Listening';
  }
}

async function onEndCall() {
  if (abortCtrl) abortCtrl.abort();
  await stopRecording();
  chunkQueue = []; streamDone = false; isPlaying = false;
  sessionOn = false; backendAwake = false;
  allWords = []; hlCount = 0;
  convHistory = []; lastQuery = '';
  orbPulse = 0;
  renderWords();
  setVS(VS.IDLE);
  switchTab(0);
}

// Init
setVS(VS.IDLE);
</script>
